version: "3.9"
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lumina:lumina@db:5432/luminalib
      JWT_SECRET: supersecret
      STORAGE_BACKEND: local
      STORAGE_PATH: /data/books
      S3_BUCKET: luminalib-books
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      S3_OBJECT_PREFIX: books
      LLM_PROVIDER: local
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: phi3
      LLM_TIMEOUT_SECONDS: 60
      LLM_MAX_INPUT_CHARS: 12000
    volumes:
      - api_data:/data
    depends_on:
      - db
      - minio
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: luminalib
    volumes:
      - db_data:/var/lib/postgresql/data
  llm:
    image: python:3.12-slim
    command: ["tail", "-f", "/dev/null"]
    # stub service; real implementation would run a local Llama server
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  db_data:
  api_data:
  minio_data:
